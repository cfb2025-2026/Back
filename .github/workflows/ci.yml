name: markety CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - "feature/**"

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Vérifie que le serveur démarre sans throw au chargement
      # (syntax error, import manquant, variable d'env absente...)
      - name: Smoke test server startup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_API_KEY: ${{ secrets.SUPABASE_DB_API_KEY }}
          NODE_ENV: test
        run: |
          bun run src/server.tsx --check-startup
